<section class="relative overflow-hidden px-5 py-20 sm:px-6 lg:px-8">
  <div class="absolute inset-0 -z-10 brand-grid"></div>
  <div class="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[0.9fr_1.1fr]">
    <div>
      <wsl-section-header
        eyebrow="Contact"
        title="Tell us what you want to build next."
        description="Share the product, workflow, or platform challenge. Webstacklabs will help turn it into a clear engineering path."
      />
      <div class="mt-10 grid gap-4">
        <div class="glass-panel flex items-center gap-4 rounded-3xl p-5">
          <span class="flex h-12 w-12 items-center justify-center rounded-2xl bg-blue-600 text-white">
            <wsl-icon name="mail" class="h-6 w-6" />
          </span>
          <div>
            <p class="text-sm font-black uppercase tracking-[0.18em] text-slate-400">Email</p>
            <p class="font-black text-slate-950">hello@webstacklabs.com</p>
          </div>
        </div>
        <div class="glass-panel flex items-center gap-4 rounded-3xl p-5">
          <span class="flex h-12 w-12 items-center justify-center rounded-2xl bg-red-600 text-white">
            <wsl-icon name="map-pin" class="h-6 w-6" />
          </span>
          <div>
            <p class="text-sm font-black uppercase tracking-[0.18em] text-slate-400">Location</p>
            <p class="font-black text-slate-950">India • Remote-first</p>
          </div>
        </div>
      </div>
    </div>

    <form class="glass-panel rounded-[2.25rem] p-6 sm:p-8" aria-label="Project inquiry form">
      <div class="grid gap-5 sm:grid-cols-2">
        <label class="grid gap-2 text-sm font-bold text-slate-700">
          Name
          <input class="rounded-2xl border border-blue-500/14 bg-white px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-600/10" type="text" name="name" placeholder="Your name">
        </label>
        <label class="grid gap-2 text-sm font-bold text-slate-700">
          Email
          <input class="rounded-2xl border border-blue-500/14 bg-white px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-600/10" type="email" name="email" placeholder="hello@webstacklabs.com">
        </label>
        <label class="grid gap-2 text-sm font-bold text-slate-700">
          Company
          <input class="rounded-2xl border border-blue-500/14 bg-white px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-600/10" type="text" name="company" placeholder="Company name">
        </label>
        <label class="grid gap-2 text-sm font-bold text-slate-700">
          Project Type
          <select class="rounded-2xl border border-blue-500/14 bg-white px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-600/10" name="projectType">
            @for (type of projectTypes; track type) {
              <option>{{ type }}</option>
            }
          </select>
        </label>
        <label class="grid gap-2 text-sm font-bold text-slate-700 sm:col-span-2">
          Message
          <textarea class="min-h-40 resize-y rounded-2xl border border-blue-500/14 bg-white px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-600/10" name="message" placeholder="Tell us about your product, workflow, deadline, or technical challenge."></textarea>
        </label>
      </div>
      <button type="button" class="mt-6 inline-flex w-full items-center justify-center gap-2 rounded-full bg-blue-600 px-6 py-4 text-sm font-black text-white shadow-xl shadow-blue-600/24 transition hover:-translate-y-0.5 hover:bg-blue-700 sm:w-auto">
        Send Inquiry
        <wsl-icon name="send" class="h-4 w-4" />
      </button>
    </form>
  </div>
</section>
