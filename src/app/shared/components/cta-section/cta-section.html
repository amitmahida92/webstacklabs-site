<section class="px-5 py-20 sm:px-6 lg:px-8">
  <div class="relative mx-auto max-w-7xl overflow-hidden rounded-[2.25rem] bg-slate-950 p-8 text-white shadow-2xl shadow-blue-950/20 sm:p-12 lg:p-16">
    <div class="absolute inset-0 brand-grid opacity-55"></div>
    <div class="absolute -left-20 -top-20 h-72 w-72 rounded-full bg-blue-600/45 blur-3xl"></div>
    <div class="absolute -right-16 bottom-0 h-72 w-72 rounded-full bg-red-600/20 blur-3xl"></div>
    <div class="relative grid gap-8 lg:grid-cols-[1fr_auto] lg:items-center">
      <div class="max-w-3xl">
        <p class="text-sm font-black uppercase tracking-[0.24em] text-blue-200">{{ eyebrow }}</p>
        <h2 class="mt-4 text-balance text-3xl font-black tracking-tight sm:text-4xl lg:text-5xl">{{ title }}</h2>
        <p class="mt-5 text-lg leading-8 text-slate-300">{{ description }}</p>
      </div>
      <a routerLink="/contact" class="inline-flex items-center justify-center gap-2 rounded-full bg-white px-6 py-4 text-sm font-black text-slate-950 shadow-xl shadow-black/20 transition hover:-translate-y-0.5 hover:bg-blue-50">
        Start a Project
        <wsl-icon name="arrow-right" class="h-4 w-4" />
      </a>
    </div>
  </div>
</section>
