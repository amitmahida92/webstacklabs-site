<div class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-6">
  @for (tech of technologies; track tech) {
    <div class="group flex min-h-24 items-center justify-center rounded-3xl border border-blue-500/12 bg-white/82 px-4 text-center shadow-lg shadow-blue-950/5 transition hover:-translate-y-1 hover:border-blue-500/30 hover:bg-blue-600 hover:text-white">
      <span class="text-sm font-black tracking-tight">{{ tech }}</span>
    </div>
  }
</div>
