<article class="group grid h-full overflow-hidden rounded-[2rem] border border-blue-500/12 bg-white shadow-xl shadow-blue-950/7 transition duration-300 hover:-translate-y-1 hover:shadow-2xl hover:shadow-blue-950/12">
  <div class="relative min-h-44 overflow-hidden bg-slate-950 p-6 text-white">
    <div class="absolute inset-0 brand-grid opacity-60"></div>
    <div class="absolute -right-20 -top-16 h-56 w-56 rounded-full bg-blue-600/45 blur-3xl"></div>
    <div class="absolute bottom-0 left-8 h-20 w-44 -skew-x-12 rounded-t-3xl bg-white/10"></div>
    <div class="relative flex items-start justify-between gap-5">
      <div>
        <p class="text-xs font-black uppercase tracking-[0.24em] text-blue-200">Case 0{{ index + 1 }}</p>
        <h3 class="mt-4 text-2xl font-black tracking-tight">{{ caseStudy.title }}</h3>
      </div>
      <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-white text-blue-700 transition group-hover:rotate-12">
        <wsl-icon name="arrow-up-right" class="h-5 w-5" />
      </span>
    </div>
  </div>

  <div class="grid gap-6 p-6">
    <div>
      <h4 class="text-sm font-black uppercase tracking-[0.18em] text-slate-400">Problem</h4>
      <p class="mt-2 text-sm leading-7 text-slate-600">{{ caseStudy.problem }}</p>
    </div>
    <div>
      <h4 class="text-sm font-black uppercase tracking-[0.18em] text-slate-400">Solution</h4>
      <p class="mt-2 text-sm leading-7 text-slate-600">{{ caseStudy.solution }}</p>
    </div>
    <div>
      <h4 class="text-sm font-black uppercase tracking-[0.18em] text-slate-400">Tech Stack</h4>
      <div class="mt-3 flex flex-wrap gap-2">
        @for (tech of caseStudy.stack; track tech) {
          <span class="rounded-full bg-blue-50 px-3 py-1.5 text-xs font-bold text-blue-700">{{ tech }}</span>
        }
      </div>
    </div>
    <div>
      <h4 class="text-sm font-black uppercase tracking-[0.18em] text-slate-400">Outcomes</h4>
      <div class="mt-3 grid gap-2">
        @for (item of caseStudy.impact; track item) {
          <p class="rounded-2xl border border-blue-500/10 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-700">{{ item }}</p>
        }
      </div>
    </div>
  </div>
</article>
