<div [class]="align === 'center' ? 'mx-auto max-w-3xl text-center' : 'max-w-3xl'">
  <p class="text-sm font-black uppercase tracking-[0.24em] text-blue-700">{{ eyebrow }}</p>
  <h2 class="mt-4 text-balance text-3xl font-black tracking-tight text-slate-950 sm:text-4xl lg:text-5xl">{{ title }}</h2>
  @if (description) {
    <p class="mt-5 text-lg leading-8 text-slate-600">{{ description }}</p>
  }
</div>
