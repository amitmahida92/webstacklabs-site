<article class="group blueprint-card relative h-full overflow-hidden rounded-[1.75rem] p-6 transition duration-300 hover:-translate-y-1 hover:border-blue-500/35 hover:shadow-2xl hover:shadow-blue-900/12">
  <div class="absolute right-0 top-0 h-28 w-28 translate-x-8 -translate-y-8 rounded-full bg-blue-500/10 blur-2xl transition group-hover:bg-red-500/12"></div>
  <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-600/20">
    <wsl-icon [name]="service.icon" class="h-6 w-6" />
  </div>
  <h3 class="mt-6 text-xl font-black tracking-tight text-slate-950">{{ service.title }}</h3>
  <p class="mt-3 text-sm leading-7 text-slate-600">{{ service.description }}</p>
  <div class="mt-6 grid gap-3">
    @for (bullet of service.bullets; track bullet) {
      <div class="flex items-center gap-3 text-sm font-semibold text-slate-700">
        <wsl-icon name="check-circle-2" class="h-4 w-4 text-blue-600" />
        <span>{{ bullet }}</span>
      </div>
    }
  </div>
</article>
